<!DOCTYPE html>
<html lang="en" style="--baropacity:0.9;">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,minimal-ui,viewport-fit=cover">
  <title>Realms of Eternal War · Ten Realms. One War.</title>
  <meta name="description" content="A multiplayer grand strategy game across ten continents. One castle. One world. Last power standing.">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ── BASE — verbatim Active Theory ── */
    #Stage,body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;touch-action:none;background:#000}
    @font-face{font-family:"nbarchitekt";src:local("Space Mono"),local("Courier New");font-weight:400}
    @font-face{font-family:"nbarchitekt";src:local("Space Mono"),local("Courier New");font-weight:700}
    :root{--baropacity:0.0}
    ::-webkit-scrollbar{width:8px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,var(--baropacity,0.9));border-radius:10px}
    #Stage,#Stage *{user-select:none;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:none}
    #Stage *,#Stage ::after,#Stage ::before{box-sizing:border-box}
    #Stage * input,#Stage * textarea{-webkit-user-select:auto}
    .GLA11y{position:absolute;width:0;height:100%;clip:rect(0 0 0 0);overflow:hidden}

    /* ── INTRO RING LOADER ── */
    #intro-ring{
      position:fixed;inset:0;z-index:200;
      display:flex;align-items:center;justify-content:center;
      background:#000;pointer-events:none;
    }
    .ring-wrap{
      position:relative;
      width:min(55vmin,420px);height:min(55vmin,420px);
    }
    .ring-svg-outer{
      position:absolute;inset:0;
      animation:spin-cw 12s linear infinite;
    }
    .ring-svg-mid{
      position:absolute;inset:0;
      animation:spin-ccw 8s linear infinite;
    }
    .ring-svg-inner{
      position:absolute;inset:0;
      animation:spin-cw 20s linear infinite;
    }
    .ring-svg-arc{
      position:absolute;inset:0;
    }
    .ring-center{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;
    }
    .ring-title{
      font-family:'Space Mono',monospace;
      font-size:clamp(28px,5vmin,44px);
      font-weight:700;
      letter-spacing:0.12em;
      color:#fff;
      text-shadow:0 0 30px rgba(201,168,76,0.8),0 0 60px rgba(201,168,76,0.4);
    }
    .ring-sub{
      font-family:'Space Mono',monospace;
      font-size:clamp(7px,1.2vmin,10px);
      font-weight:400;
      letter-spacing:0.35em;
      text-transform:uppercase;
      color:rgba(201,168,76,0.6);
    }
    @keyframes spin-cw  {to{transform:rotate(360deg)}}
    @keyframes spin-ccw {to{transform:rotate(-360deg)}}
    @keyframes draw-arc {
      0%  {stroke-dashoffset:1200}
      80% {stroke-dashoffset:0}
      100%{stroke-dashoffset:0}
    }
    @keyframes ring-out{
      0%  {opacity:1;transform:scale(1)}
      60% {opacity:1;transform:scale(0.95)}
      100%{opacity:0;transform:scale(0.15)}
    }
    .ring-exiting{animation:ring-out 0.9s cubic-bezier(.55,0,1,.45) forwards!important}

    /* ── CHAT DOM — verbatim AT ── */
    .ChatDOM .wrapper{display:flex;flex-direction:column;justify-content:flex-end;padding:3rem 3rem;mix-blend-mode:color-dodge;pointer-events:none;position:fixed;bottom:0;left:0;z-index:3;width:min(450px,100%);height:calc(100% - 100px);background-color:transparent;}
    @media(max-width:768px){.ChatDOM .wrapper{padding:2rem 2rem;mix-blend-mode:normal;}}
    .ChatDOM .messages{display:flex;flex-direction:column-reverse;justify-content:flex-start;overflow:hidden;margin-bottom:1rem;height:100%;-webkit-mask-image:linear-gradient(to top,white 0%,white 75%,transparent 90%);}
    .ChatDOM .messages p,.ChatDOM .messages a{font-family:"Space Mono","nbarchitekt",monospace;font-size:14px;font-weight:400;line-height:1.5;margin:6px 0;margin-left:10px;white-space:pre-wrap;}
    @media(max-width:768px){.ChatDOM .messages p,.ChatDOM .messages a{font-size:13px;margin:4px 0;}}
    @keyframes cursor-blink{0%{background:transparent}25%{background:transparent}50%{background:#00ffff}75%{background:#00ffff}100%{background:transparent}}
    .ChatDOM .messages p.blink::after,.ChatDOM .messages a.blink::after{content:"";position:absolute;width:8px;height:12px;margin-top:4px;margin-left:10px;background-color:#00ffff;display:inline-block;animation:cursor-blink 1.5s infinite}
    .ChatDOM a{color:#c6c6c6;pointer-events:auto;cursor:pointer;font-weight:700;width:fit-content;transition:all 0.4s cubic-bezier(.17,.4,.02,.99);transform:translateX(0px)}
    @media(max-width:768px){.ChatDOM a{color:#eeeeee}.ChatDOM a.home{color:#9ca5ff}}
    .ChatDOM a.active{color:#ffffff;text-shadow:#ffffff 1px 0px 5px;transform:translateX(10px)}
    @media(hover:hover){.ChatDOM a:hover{color:#ffffff;font-weight:400}}
    .ChatDOM textarea{background:rgba(0,0,0,0.2);color:rgba(255,255,255,0.7);font-family:"Space Mono","nbarchitekt",monospace;font-weight:400;font-size:14px;outline:none;border:2px solid rgba(255,255,255,0.3);border-radius:50px;padding:14px 25px 4px;transition:all 0.8s cubic-bezier(.17,.4,.02,.99);width:200px;white-space:nowrap;min-height:40px;resize:none;pointer-events:auto;overflow:hidden}
    .ChatDOM textarea:hover{border:2px solid rgba(255,255,255,0.5)}
    .ChatDOM textarea:focus{color:#eeeeee;background:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.8)}
    .ChatDOM textarea.extended{background:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.9);width:330px}
    .ChatDOM textarea::placeholder{color:rgba(255,255,255,0.4)}
    @keyframes dot-flashing{0%{background-color:#00ffff;box-shadow:0 1px 6px #00ffff}50%,100%{background-color:rgba(200,255,255,0.2)}}
    .ChatDOM .flashing{position:relative;left:37px;bottom:32px;width:12px;height:12px;border-radius:6px;background-color:#00ffff;opacity:0.3;animation:dot-flashing 1.5s infinite linear alternate;animation-delay:0.75s}
    .ChatDOM .flashing::before,.ChatDOM .flashing::after{content:"";display:inline-block;position:absolute;top:0;width:12px;height:12px;border-radius:6px;background-color:#00ffff;animation:dot-flashing 1.5s infinite alternate}
    .ChatDOM .flashing::before{left:-25px;animation-delay:0s}
    .ChatDOM .flashing::after{left:25px;animation-delay:1.5s}

    /* ── COOKIE — verbatim AT ── */
    .CookieBanner .wrapper{position:fixed;bottom:40px;right:32px;z-index:999999;cursor:default;width:370px;height:180px;padding:16px 28px 32px;background-color:rgba(0,0,0,0.5);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,0.3);border-radius:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px}
    @media(max-width:768px){.CookieBanner .wrapper{bottom:0;left:0;right:0;width:100%;border-radius:12px 12px 0 0}}
    .CookieBanner .buttons{width:100%;display:flex;flex-direction:row;justify-content:center;align-items:center;gap:12px}
    .CookieBanner p,.CookieBanner a{font-family:"Space Mono","nbarchitekt",monospace;font-size:14px;font-weight:400;line-height:1.5;margin:6px 0;white-space:pre-wrap}
    .CookieBanner p{color:white}
    .CookieBanner a{color:#c6c6c6;pointer-events:auto;cursor:pointer;font-weight:700}
    .CookieBanner button{cursor:pointer;padding:4px 18px;border-radius:500px;border:2px solid rgba(255,255,255,0.5);transition:all 0.2s ease-out}
    .CookieBanner button p{font-size:12px;color:white}
    .CookieBanner button.accept{background:#9ca5ff55}
    .CookieBanner button.reject{background:#00000055}
    @media(hover:hover){.CookieBanner button:hover{box-shadow:0 1px 6px #ffffff55}.CookieBanner button:hover p{font-weight:700;text-shadow:#ffffff99 0px 0px 5px}.CookieBanner button.accept:hover{background:#9ca5ff22}.CookieBanner button.reject:hover{background:#00000011}}

    /* ── MUSIC PLAYER — verbatim AT ── */
    .MusicPlayerDOM .wrapper{display:flex;flex-direction:row;justify-content:space-between;align-items:center;mix-blend-mode:plus-lighter;position:fixed;top:70px;right:32px;margin:2.6rem 2.6rem;z-index:3;padding:10px 4px;pointer-events:none;border:1px solid rgba(255,255,255,0.1);background-color:transparent;width:170px;height:42px;border-radius:7px;opacity:0;transition:opacity 2000ms cubic-bezier(0.215,0.61,0.355,1) 1500ms}
    @media(max-width:768px){.MusicPlayerDOM .wrapper{top:55px;margin:2rem 2rem}}
    .MusicPlayerDOM button{width:36px;height:32px;pointer-events:auto;cursor:pointer;background-color:rgba(255,255,255,0.1);border-radius:5px;border:1px solid rgba(255,255,255,0.6);mix-blend-mode:color-dodge;font-family:"Space Mono","nbarchitekt",monospace;font-size:14px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;opacity:0.3;transition:all 0.4s ease-out}
    .MusicPlayerDOM button:hover{opacity:1}
    @keyframes ticker{0%{transform:translate3d(0,0,0);visibility:visible}100%{transform:translate3d(-100%,0,0)}}
    .MusicPlayerDOM .ticker{display:inline-block;height:30px;line-height:30px;width:80px;overflow:hidden;background-color:transparent;white-space:nowrap;opacity:0.4;box-sizing:content-box;mix-blend-mode:color-dodge}
    .MusicPlayerDOM .ticker>*{display:inline-block;height:30px;margin:0;animation-iteration-count:infinite;animation-timing-function:linear;animation-name:ticker;animation-duration:9s;padding:0 0.8rem;font-family:"Space Mono","nbarchitekt",monospace;font-size:10px;font-weight:400;color:white}

    /* ── NAV PILL — AT style ── */
    .NavigationUI{position:fixed;top:24px;right:24px;z-index:999;display:flex;align-items:center}
    .NavigationUI .pill{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,0.2);border-radius:500px;overflow:hidden;background:transparent}
    .NavigationUI .link{display:block;padding:7px 18px;font-family:"Space Mono","nbarchitekt",monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.8);text-decoration:none;transition:color 0.4s cubic-bezier(.17,.4,.02,.99);white-space:nowrap;pointer-events:auto;cursor:pointer}
    .NavigationUI .link:hover{color:#ffffff}
    .NavigationUI .sep{width:1px;height:18px;background:rgba(255,255,255,0.2);flex-shrink:0}
  </style>
</head>
<body>
<div id="Stage">

  <!-- ACCESSIBILITY -->
  <div class="GLA11y" style="z-index:-1">
    <a href="world.html">Enter Aethelgard</a>
    <a href="https://www.instagram.com/realms_of_eternal_war/">Follow</a>
  </div>

  <!-- WEBGL CANVAS -->
  <div class="Container" style="position:static">
    <canvas id="glcanvas" style="background:#000;pointer-events:none;display:block"></canvas>
  </div>

  <!-- INTRO RING LOADER -->
  <div id="intro-ring">
    <div class="ring-wrap">

      <!-- Outer ring — slow CW -->
      <svg class="ring-svg-outer" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="200" cy="200" r="188" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <!-- 48 tick marks -->
        <g id="ticks"></g>
      </svg>

      <!-- Drawing arc -->
      <svg class="ring-svg-arc" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="200" cy="200" r="188" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"
                stroke-dasharray="1181" stroke-dashoffset="1181"
                transform="rotate(-90 200 200)"
                style="animation:draw-arc 1.8s cubic-bezier(.17,.4,.02,.99) 0.2s forwards"/>
      </svg>

      <!-- Mid ring — CCW -->
      <svg class="ring-svg-mid" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="200" cy="200" r="160" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
        <circle cx="200" cy="200" r="158" stroke="rgba(201,168,76,0.12)" stroke-width="0.5" stroke-dasharray="6 4"/>
        <!-- 4 corner diamonds -->
        <rect x="197" y="38" width="6" height="6" fill="rgba(201,168,76,0.6)" transform="rotate(45 200 41)"/>
        <rect x="197" y="358" width="6" height="6" fill="rgba(201,168,76,0.6)" transform="rotate(45 200 361)"/>
        <rect x="38" y="197" width="6" height="6" fill="rgba(201,168,76,0.6)" transform="rotate(45 41 200)"/>
        <rect x="358" y="197" width="6" height="6" fill="rgba(201,168,76,0.6)" transform="rotate(45 361 200)"/>
      </svg>

      <!-- Inner ring — slow CW -->
      <svg class="ring-svg-inner" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="200" cy="200" r="118" stroke="rgba(139,0,0,0.3)" stroke-width="0.8" stroke-dasharray="8 5"/>
        <circle cx="200" cy="200" r="100" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      </svg>

      <!-- Centre text — static -->
      <div class="ring-center">
        <div class="ring-title">RoEW</div>

      </div>

    </div>
  </div>

  <!-- NAV PILL -->
  <div class="NavigationUI">
    <div class="pill">
      <a class="link" href="world.html">Enter Aethelgard</a>
      <div class="sep"></div>
      <a class="link" href="https://www.instagram.com/realms_of_eternal_war/" target="_blank" rel="noopener">Follow</a>
    </div>
  </div>

  <!-- CHAT DOM -->
  <div class="ChatDOM">
    <div class="wrapper" style="opacity:0;transition:opacity 400ms cubic-bezier(0.39,0.575,0.565,1);display:none">
      <div class="messages">
        <a class="home" data-action="follow">-&gt; follow the journey</a>
        <a class="home" data-action="lore">-&gt; the chronicles</a>
        <a class="home" data-action="races">-&gt; the six races</a>
        <a class="home" data-action="world">-&gt; the world</a>
        <p style="color:rgb(244,244,244)">What are you looking for?</p>
      </div>
      <textarea class="input" maxlength="100" placeholder="Ask me anything..."></textarea>
      <div class="flashing" style="opacity:0"></div>
    </div>
  </div>

  <!-- COOKIE -->
  <div class="CookieBanner" style="display:none">
    <div class="wrapper" style="opacity:0;transition:opacity 400ms ease">
      <p>This site stores only your notification preference. No tracking. See <a href="world.html">our approach.</a></p>
      <div class="buttons">

    </div>

  <!-- MUSIC PLAYER -->
  <div class="MusicPlayerDOM">
    <div class="wrapper">
      <button class="arrowL"><p>&lt;&lt;</p></button>
      <div class="ticker">
        <div class="tickerItem0">1. War of Aethelgard</div>
        <div class="tickerItem1">1. War of Aethelgard</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════════════
   TICK MARKS on intro ring SVG
═══════════════════════════════════════════════════ */
(function buildTicks(){
  const g = document.getElementById('ticks');
  if(!g) return;
  for(let i=0;i<48;i++){
    const angle = (i/48)*Math.PI*2 - Math.PI/2;
    const isMain = i%12===0, isMid = i%6===0;
    const r1 = 188, r2 = 188 - (isMain?14:isMid?9:5);
    const x1=200+r1*Math.cos(angle), y1=200+r1*Math.sin(angle);
    const x2=200+r2*Math.cos(angle), y2=200+r2*Math.sin(angle);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke', isMain?'rgba(255,255,255,0.5)':isMid?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.12)');
    line.setAttribute('stroke-width', isMain?'1.5':isMid?'1':'0.8');
    g.appendChild(line);
  }
})();

/* ═══════════════════════════════════════════════════
   INTRO RING EXIT SEQUENCE
═══════════════════════════════════════════════════ */
const introEl = document.getElementById('intro-ring');
setTimeout(()=>{
  introEl.classList.add('ring-exiting');
  setTimeout(()=>{ introEl.style.display='none'; }, 900);
}, 2800);

/* ═══════════════════════════════════════════════════
   THREE.JS SETUP
═══════════════════════════════════════════════════ */
const canvas = document.getElementById('glcanvas');
const W=()=>window.innerWidth, H=()=>window.innerHeight;

const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setSize(W(),H()); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,1);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,W()/H(),0.1,100);
camera.position.set(0,0,4.5);

window.addEventListener('resize',()=>{
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

/* ═══════════════════════════════════════════════════
   BONE / SPINE STRUCTURE — centre piece
═══════════════════════════════════════════════════ */
/* — REAL SPINE MESH (extracted from Active Theory's spine.bin, decoded via Draco) — */
function loadSpineMesh(url, onLoad){
  fetch(url).then(r=>r.arrayBuffer()).then(buf=>{
    const dv = new DataView(buf);
    let off = 0;
    const numVerts = dv.getUint32(off, true); off += 4;
    const numIndices = dv.getUint32(off, true); off += 4;

    const position = new Float32Array(buf, off, numVerts*3); off += numVerts*3*4;
    const normal   = new Float32Array(buf, off, numVerts*3); off += numVerts*3*4;
    const uv       = new Float32Array(buf, off, numVerts*2); off += numVerts*2*4;
    const index    = new Uint32Array(buf, off, numIndices);

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(position.slice(), 3));
    geo.setAttribute('normal',   new THREE.BufferAttribute(normal.slice(), 3));
    geo.setAttribute('uv',       new THREE.BufferAttribute(uv.slice(), 2));
    geo.setIndex(new THREE.BufferAttribute(index.slice(), 1));
    geo.computeBoundingSphere();
    onLoad(geo);
  }).catch(err=>{
    console.warn('Spine mesh failed to load, falling back to procedural rod:', err);
    onLoad(null);
  });
}

/* — Iridescent holographic chrome shader (matches AT's color-shifting bone material) — */
const spineShaderMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColorA: { value: new THREE.Color(0xc9a84c) },
    uColorB: { value: new THREE.Color(0x8b0000) },
    uColorC: { value: new THREE.Color(0x4488ff) },
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec2 vUv;
    void main(){
      vNormal = normalize(normalMatrix * normal);
      vec4 worldPos = modelViewMatrix * vec4(position,1.0);
      vViewDir = normalize(-worldPos.xyz);
      vUv = uv;
      gl_Position = projectionMatrix * worldPos;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform vec3 uColorC;
    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec2 vUv;
    void main(){
      float fresnel = pow(1.0 - max(dot(normalize(vNormal), normalize(vViewDir)), 0.0), 2.2);
      float shift = sin(vUv.y*14.0 + uTime*0.6) * 0.5 + 0.5;
      float shift2 = cos(vUv.x*9.0 - uTime*0.4) * 0.5 + 0.5;
      vec3 iridescent = mix(uColorA, uColorB, shift);
      iridescent = mix(iridescent, uColorC, shift2*0.4);
      vec3 base = vec3(0.02,0.02,0.035);
      vec3 col = mix(base, iridescent, fresnel*0.9 + 0.12);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});

const boneGroup = new THREE.Group();
scene.add(boneGroup);

/* Fallback procedural rod shown instantly; swapped for real mesh once it loads */
const fallbackSpineGeo = new THREE.CylinderGeometry(0.10,0.10,3.2,12);
const fallbackSpineMesh = new THREE.Mesh(fallbackSpineGeo, spineShaderMat);
boneGroup.add(fallbackSpineMesh);

let realSpineMesh = null;
loadSpineMesh('assets/geometry/spine.bin', (geo)=>{
  if(!geo) return; // keep fallback
  boneGroup.remove(fallbackSpineMesh);
  realSpineMesh = new THREE.Mesh(geo, spineShaderMat);
  // Active Theory's source mesh is small/local-space (~0.28 units); scale + orient to fill the same
  // vertical extent the fallback rod occupied (~3.2 units tall along Y).
  realSpineMesh.geometry.computeBoundingBox();
  const bb = realSpineMesh.geometry.boundingBox;
  const meshHeight = bb.max.y - bb.min.y || 0.3;
  const targetHeight = 3.2;
  const scale = targetHeight / meshHeight;
  realSpineMesh.scale.setScalar(scale);
  realSpineMesh.position.y = -((bb.min.y+bb.max.y)/2)*scale;
  boneGroup.add(realSpineMesh);
});

/* — core at origin (double octahedron) — */
const coreGroup = new THREE.Group();
coreGroup.add(new THREE.Mesh(
  new THREE.OctahedronGeometry(0.30,0),
  new THREE.MeshPhongMaterial({color:0x03030a,emissive:0x0c0c28,shininess:200,specular:0x8888ff,transparent:true,opacity:0.95})
));
coreGroup.add(new THREE.Mesh(
  new THREE.OctahedronGeometry(0.32,0),
  new THREE.MeshBasicMaterial({color:0xc9a84c,wireframe:true,transparent:true,opacity:0.55})
));
coreGroup.add(new THREE.Mesh(
  new THREE.SphereGeometry(0.55,16,16),
  new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.038,side:THREE.BackSide})
));
coreGroup.add(new THREE.Mesh(
  new THREE.SphereGeometry(0.80,16,16),
  new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.012,side:THREE.BackSide})
));
boneGroup.add(coreGroup);

/* — outer orbital rings (the AT-style large rings around bone) — */
function mkRing(inner,outer,color,opacity,rx,rz){
  const m=new THREE.Mesh(
    new THREE.RingGeometry(inner,outer,256),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity,side:THREE.DoubleSide})
  );
  m.rotation.x=rx; m.rotation.z=rz; return m;
}
const R1=mkRing(0.88,0.882,0xc9a84c,0.50,Math.PI/2.1,0.18);
const R2=mkRing(1.15,1.152,0x8b0000,0.30,Math.PI/3.0,Math.PI/5);
const R3=mkRing(1.42,1.422,0xc9a84c,0.18,Math.PI/4.0,Math.PI/4);
const R4=mkRing(1.68,1.682,0x343755,0.22,Math.PI/6.0,Math.PI/3.5);
const R5=mkRing(1.95,1.952,0x8b0000,0.10,Math.PI/2.8,Math.PI/2.5);
[R1,R2,R3,R4,R5].forEach(r=>boneGroup.add(r));

/* ═══════════════════════════════════════════════════
   ORBITING INFO SLABS
═══════════════════════════════════════════════════ */
const RACE_DATA=[
  {name:'HUMANS',      sub:'The Adaptable Innovators',    col:0xc9a84c, speed:0.28, radius:2.10, inc:0.20, phase:0.00},
  {name:'ELVES',       sub:'Masters of Ancient Wisdom',   col:0x33bb55, speed:0.23, radius:2.30, inc:0.85, phase:1.05},
  {name:'DWARVES',     sub:'Craftsmen of the Deep Earth', col:0x888888, speed:0.32, radius:1.95, inc:-0.55,phase:2.09},
  {name:'OGRE TRIBES', sub:'Warriors of the Borderlands', col:0x993322, speed:0.26, radius:2.20, inc:0.42, phase:3.14},
  {name:'MERMEN',      sub:'Rulers of the Seas',          col:0x0099cc, speed:0.30, radius:2.05, inc:-0.72,phase:4.19},
  {name:'HARPIES',     sub:'Masters of the Skies',        col:0x4488ff, speed:0.25, radius:2.25, inc:0.65, phase:5.24},
];

function makeSlabTexture(name,sub,col){
  const W=480,H=132,cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const cx=cv.getContext('2d');
  const r=(col>>16)&0xff,g=(col>>8)&0xff,b=col&0xff;

  // Background
  cx.fillStyle='rgba(0,0,0,0.82)'; cx.fillRect(0,0,W,H);

  // Left accent bar
  cx.fillStyle=`rgba(${r},${g},${b},0.95)`; cx.fillRect(0,0,3,H);

  // Full border
  cx.strokeStyle=`rgba(${r},${g},${b},0.35)`;
  cx.lineWidth=1; cx.strokeRect(0.5,0.5,W-1,H-1);

  // Top separator line
  cx.strokeStyle=`rgba(${r},${g},${b},0.2)`;
  cx.lineWidth=1; cx.beginPath(); cx.moveTo(3,H*0.55); cx.lineTo(W,H*0.55); cx.stroke();

  // Corner bracket top-right
  cx.strokeStyle=`rgba(${r},${g},${b},0.5)`;
  cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(W-22,4); cx.lineTo(W-4,4); cx.lineTo(W-4,22); cx.stroke();

  // Corner bracket bot-left
  cx.beginPath(); cx.moveTo(22,H-4); cx.lineTo(4,H-4); cx.lineTo(4,H-22); cx.stroke();

  // Name text
  cx.fillStyle='#ffffff';
  cx.font='bold 24px monospace';
  cx.letterSpacing='3px';
  cx.fillText(name,18,44);

  // Subtitle
  cx.fillStyle='#c6c6c6';
  cx.font='15px monospace';
  cx.letterSpacing='1px';
  cx.fillText(sub,18,85);

  // Small label bottom right
  cx.fillStyle=`rgba(${r},${g},${b},0.5)`;
  cx.font='10px monospace';
  cx.textAlign='right';
  cx.fillText('AETHELGARD',W-10,H-10);

  return new THREE.CanvasTexture(cv);
}

const slabObjects=[];
const tmpQ=new THREE.Quaternion();

RACE_DATA.forEach(d=>{
  const tex=makeSlabTexture(d.name,d.sub,d.col);
  const geo=new THREE.PlaneGeometry(1.55,0.43);
  const mat=new THREE.MeshBasicMaterial({
    map:tex, transparent:true, opacity:0.90,
    side:THREE.DoubleSide, depthWrite:false,
  });
  const slab=new THREE.Mesh(geo,mat);

  // Edge glow frame
  const r=(d.col>>16)&0xff,g=(d.col>>8)&0xff,b=d.col&0xff;
  const edgeGeo=new THREE.EdgesGeometry(new THREE.BoxGeometry(1.58,0.46,0.002));
  const edgeMat=new THREE.LineBasicMaterial({color:d.col,transparent:true,opacity:0.4});
  const edge=new THREE.LineSegments(edgeGeo,edgeMat);
  slab.add(edge);

  // Orbit group — tilt defines orbital plane inclination
  const orbitGroup=new THREE.Group();
  orbitGroup.rotation.x=d.inc;
  orbitGroup.rotation.z=d.phase*0.15;
  scene.add(orbitGroup);

  // Position group at orbital radius
  const posGroup=new THREE.Group();
  posGroup.position.set(d.radius,0,0);
  posGroup.add(slab);
  orbitGroup.add(posGroup);

  slabObjects.push({orbitGroup,posGroup,slab,d});
});

/* ═══════════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════════ */
const PC=3200;
const pP=new Float32Array(PC*3),pC=new Float32Array(PC*3);
for(let i=0;i<PC;i++){
  const r=2.2+Math.pow(Math.random(),0.35)*2.5;
  const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);
  pP[i*3]=r*Math.sin(p)*Math.cos(t); pP[i*3+1]=r*Math.cos(p)*1.4; pP[i*3+2]=r*Math.sin(p)*Math.sin(t);
  const rnd=Math.random();
  if(rnd<0.55){pC[i*3]=0.79+Math.random()*0.12;pC[i*3+1]=0.50+Math.random()*0.20;pC[i*3+2]=0.10+Math.random()*0.12;}
  else if(rnd<0.78){pC[i*3]=0.55+Math.random()*0.25;pC[i*3+1]=0.01;pC[i*3+2]=0;}
  else{pC[i*3]=0.15+Math.random()*0.12;pC[i*3+1]=0;pC[i*3+2]=0.35+Math.random()*0.28;}
}
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pP,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pC,3));
const ptcl=new THREE.Points(pGeo,
  new THREE.PointsMaterial({size:0.025,vertexColors:true,transparent:true,opacity:0.60,sizeAttenuation:true})
);
scene.add(ptcl);

/* ═══════════════════════════════════════════════════
   LIGHTING
═══════════════════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0x0a0a18,3));
const L1=new THREE.PointLight(0xc9a84c,1.5,15); L1.position.set(2,1.5,3); scene.add(L1);
const L2=new THREE.PointLight(0x8b0000,0.8,10); L2.position.set(-2,-1.5,-3); scene.add(L2);
const L3=new THREE.PointLight(0xc9a84c,0.5,8);  L3.position.set(0,0,0); scene.add(L3);

/* ═══════════════════════════════════════════════════
   MOUSE
═══════════════════════════════════════════════════ */
let mX=0,mY=0,cX=0,cY=0;
document.addEventListener('mousemove',e=>{mX=(e.clientX/W()-0.5);mY=(e.clientY/H()-0.5);});
document.addEventListener('touchmove',e=>{
  if(e.touches[0]){mX=(e.touches[0].clientX/W()-0.5);mY=(e.touches[0].clientY/H()-0.5);}
},{passive:true});

/* ═══════════════════════════════════════════════════
   ANIMATION LOOP
═══════════════════════════════════════════════════ */
const clock=new THREE.Clock();

(function tick(){
  requestAnimationFrame(tick);
  const t=clock.getElapsedTime();

  // Bone structure — slow breathe + rotate
  spineShaderMat.uniforms.uTime.value = t;
  boneGroup.rotation.y += 0.0022;
  boneGroup.rotation.x = Math.sin(t*0.18)*0.04;

  // Core pulse
  const pulse=0.98+Math.sin(t*1.4)*0.02;
  coreGroup.scale.setScalar(pulse);
  coreGroup.rotation.y += 0.008;
  coreGroup.rotation.z += 0.003;

  // Orbital rings rotate independently
  R1.rotation.y+=0.0032; R2.rotation.x+=0.0020;
  R3.rotation.z+=0.0025; R4.rotation.y-=0.0018; R5.rotation.x-=0.0012;

  // Orbiting slabs
  slabObjects.forEach(({orbitGroup,posGroup,slab,d})=>{
    // Advance orbit
    orbitGroup.rotation.y += d.speed * 0.004;

    // Billboard: make slab face camera in world space
    const parentQuat = new THREE.Quaternion();
    posGroup.getWorldQuaternion(parentQuat);
    camera.getWorldQuaternion(tmpQ);
    // Slab local quat = inv(parent world) * camera world
    slab.quaternion.copy(parentQuat.invert().multiply(tmpQ));
  });

  // Particles drift
  ptcl.rotation.y+=0.0003; ptcl.rotation.x=mY*0.04;

  // Orbiting gold light
  L1.position.x=Math.sin(t*0.32)*3; L1.position.z=Math.cos(t*0.32)*3;

  // Mouse parallax on camera
  cX+=(mY*0.28-cX)*0.03; cY+=(mX*0.28-cY)*0.03;
  camera.position.x+=(mX*0.30-camera.position.x)*0.02;
  camera.position.y+=(-mY*0.25-camera.position.y)*0.02;
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
})();

/* ═══════════════════════════════════════════════════
   CHAT LOGIC
═══════════════════════════════════════════════════ */
const textarea=document.querySelector('.ChatDOM textarea');
const flashing=document.querySelector('.ChatDOM .flashing');
const messages=document.querySelector('.ChatDOM .messages');

const RESP={
  world:  ['→ ten continents. each one a different war.','→ avaloria. frostpeak. shadowvale. windspire.','click to enter and explore →'],
  races:  ['→ six races. six ways to wage war.','→ humans. elves. dwarves. ogres. mermen. harpies.','orbiting above — watch them turn.'],
  lore:   ['→ the chronicles of aethelgard.','what the historians believe happened.','and what they could not bring themselves to write.'],
  follow: ['→ @realms_of_eternal_war','every post is a chapter.','instagram — follow the build →'],
  win:    ['→ complete and utter dominance.','the last independent power standing.','there is no second place.'],
  castle: ['→ one castle. one world.','walls that conform to terrain.','every fortress unique. none of them safe.'],
  secret: ['→ ...','four known ways to win.','and one that is not listed anywhere.'],
  war:    ['→ sixty years. every empire fell.','the great war had no clear cause.','it should have been suspicious.'],
  help:   ['→ try: world / races / lore / war / castle / win / follow / secret'],
};

function addMsg(text,isLink,href){
  const el=document.createElement(isLink?'a':'p');
  el.textContent=text;
  if(isLink&&href){el.href=href;el.style.color='#c6c6c6';el.style.fontWeight='700';}
  messages.insertBefore(el,messages.firstChild);
}

function process(q){
  const key=Object.keys(RESP).find(k=>q.toLowerCase().includes(k))||'help';
  flashing.style.opacity='0.3';
  setTimeout(()=>{
    flashing.style.opacity='0';
    RESP[key].slice().reverse().forEach((l,i)=>setTimeout(()=>addMsg(l,false,''),i*200));
  },900);
}

textarea.addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();const q=textarea.value.trim();if(q){addMsg('> '+textarea.value);textarea.value='';process(q);}}
});
textarea.addEventListener('focus',()=>textarea.classList.add('extended'));
textarea.addEventListener('blur',()=>{if(!textarea.value)textarea.classList.remove('extended');});

document.querySelectorAll('.ChatDOM .messages a.home').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    const action=a.dataset.action||'';
    addMsg('> '+a.textContent);
    process(action);
    const dest={world:'world.html#world',races:'world.html#races',lore:'world.html#lore',follow:'world.html#follow'}[action]||'world.html';
    setTimeout(()=>{window.location.href=dest;},1400);
  });
  a.addEventListener('mouseover',()=>a.classList.add('active'));
  a.addEventListener('mouseout',()=>a.classList.remove('active'));
});

/* ── MUSIC ── */
const TRACKS=['1. War of Aethelgard','2. Shadowvale Drift','3. The Frozen North','4. Ember March','5. The Fifth Path'];
let ti=0;
function setTrack(i){ti=(i+TRACKS.length)%TRACKS.length;['tickerItem0','tickerItem1'].forEach(id=>{const el=document.querySelector('.MusicPlayerDOM .'+id);if(el)el.textContent=TRACKS[ti];});}
document.querySelector('.MusicPlayerDOM .arrowL').addEventListener('click',()=>setTrack(ti-1));
document.querySelector('.MusicPlayerDOM .arrowR').addEventListener('click',()=>setTrack(ti+1));

document.querySelector('.CookieBanner .accept').addEventListener('click',()=>{localStorage.setItem('roew_cookie','1');cbw.style.opacity='0';setTimeout(()=>document.querySelector('.CookieBanner').style.display='none',400);});

})();
